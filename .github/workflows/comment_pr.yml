name: Comment on the pull request

on:
  workflow_run:
    workflows: ["Receive PR"]
    types:
      - completed

jobs:
  upload:
    runs-on: ubuntu-latest
    if: >
      github.event.workflow_run.event == 'pull_request' &&
      github.event.workflow_run.conclusion == 'success'
    permissions:
      actions: read
      pull-requests: write
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: outputs
          # github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ github.event.workflow_run.id }}

      - name: test
        env:
          JSON: ${{ toJSON(github.event) }}
        run: echo $JSON

      - name: test2
        env:
          JSON: ${{ toJSON(github.event.workflow_run) }}
        run: echo $JSON

      - name: test3
        env:
          JSON: ${{ toJSON(github.event.workflow_run.pull_requests) }}
        run: echo $JSON

      - name: test4
        run: echo ${{ github.event.workflow_run.pull_requests.number }}

      - name: Comment on PR
        uses: actions/github-script@v7
        with:
          github-token: ${{secrets.GITHUB_TOKEN}}
          script: |
            var fs = require('fs');
            github.rest.issues.createComment({
              issue_number: ${{ github.event.workflow_run.pull_requests.number }},
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: fs.readFileSync('./valgrind.txt'))
            })
