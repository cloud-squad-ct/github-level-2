name: Comment on the pull request

on:
  workflow_run:
    workflows: ["Receive PR"]
    types:
      - completed

permissions:
  actions: read
  pull-requests: write

jobs:
  upload:
    runs-on: ubuntu-latest
    if: >
      github.event.workflow_run.event == 'pull_request' &&
      github.event.workflow_run.conclusion == 'success'
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: outputs
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ github.event.workflow_run.id }}

      - name: test
        env:
          JSON: ${{ toJSON(github.event) }}
        run: echo $JSON

      - name: Comment on PR
        uses: actions/github-script@v7
        with:
          github-token: ${{secrets.GITHUB_TOKEN}}
          script: |
            var fs = require('fs');
            github.rest.issues.createComment({
              issue_number: ${{ github.event.workflow_run.event.pull_requests.number }},
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: fs.readFileSync('./valgrind.txt'))
            })
        # run: gh pr comment "$NUMBER" --body-file ./valgrind.txt
        # env:
        #   GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        #   GH_REPO: ${{ github.repository }}
          # NUMBER: ${{ github.event.workflow_run.event.pull_request.number }}
